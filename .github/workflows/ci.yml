name: CI/CD

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]

jobs:
  buildFatJarForJVM:
    name: Build JVM jar application
    runs-on: ubuntu-latest
    outputs:
      tag-version: ${{ steps.tag_version.outputs.new_tag }}

    steps:
      # Faster checkout (no full history)
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      # Setup Java with built-in Gradle cache
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      # Extra Gradle cache layer (stronger caching)
      - name: Cache Gradle files
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      # Only fetch full history when tagging is needed
      - name: Fetch full history for tagging
        if: github.ref == 'refs/heads/main'
        run: git fetch --prune --unshallow

      # Tag version (only on main)
      - name: Bump version and push tag
        if: github.ref == 'refs/heads/main'
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main

      # Build with strong Gradle optimizations
      - name: Build with Gradle (PR)
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew build --parallel --build-cache

      - name: Build with Gradle (main)
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TFDB_APIKEY: ${{ secrets.TFDB_APIKEY }}
          PREMIUMIZE_APIKEY: ${{ secrets.PREMIUMIZE_APIKEY }}
          ALLDEBRID_APIKEY: ${{ secrets.ALLDEBRID_APIKEY }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: ./gradlew build --parallel --build-cache

      # Upload artifact only for main
      - uses: actions/upload-artifact@v7
        if: github.ref == 'refs/heads/main'
        with:
          name: jvmArtifacts-${{ github.sha }}
          path: ./build/libs/boat.jar
          retention-days: 1

  releaseAndRestart:
    name: Release + Restart Server
    runs-on: ubuntu-latest
    needs: [buildFatJarForJVM]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: jvmArtifacts-${{ github.sha }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.buildFatJarForJVM.outputs.tag-version }}
          files: boat.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Restart server
        run: curl ${{ secrets.SERVERURL }}/boat/shutdown || true