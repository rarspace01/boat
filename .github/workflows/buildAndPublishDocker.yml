name: buildAndPublishDocker

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  buildFatJarForJVM:
    name: Build and publish docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
#      - name: Set up Docker Buildx
#        uses: docker/setup-buildx-action@v5
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/boat:latest
          outputs: type=image,annotation-index.org.opencontainers.image.description=boat dockerimage image
      - name: Delete old Docker images except latest
        uses: actions/delete-package-versions@v5
        with:
          package-name: boat
          package-type: container
          min-versions-to-keep: 1
          ignore-versions: '^latest$'