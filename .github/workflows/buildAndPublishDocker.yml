name: buildAndPublishDocker

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  buildFatJarForJVM:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push (with cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/boat:latest
          outputs: type=image,annotation-index.org.opencontainers.image.description=boat dockerimage image
      - name: Delete old Docker images except latest
        uses: actions/delete-package-versions@v5
        with:
          package-name: boat
          package-type: container
          min-versions-to-keep: 1
          ignore-versions: '^latest$'